name: AI Daily Report

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Install CLI fetcher tools
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          ~/.local/bin/uv tool install twitter-cli
          ~/.local/bin/uv tool install xiaohongshu-cli

      - name: 🖼️ Install image generation deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk 2>/dev/null || true
          npx puppeteer browsers install chrome

      - name: 🍪 注入小红书 Cookie
        if: ${{ env.XHS_A1 != '' }}
        env:
          XHS_A1: ${{ secrets.XHS_A1 }}
        run: |
          mkdir -p ~/.xiaohongshu-cli
          cat > ~/.xiaohongshu-cli/cookies.json << EOF
          {
            "a1": "${{ secrets.XHS_A1 }}",
            "web_session": "${{ secrets.XHS_WEB_SESSION }}",
            "saved_at": $(python3 -c "import time; print(time.time())")
          }
          EOF
          echo "✓ 小红书 Cookie 已注入"

      - name: 🍪 注入 Twitter Cookie
        if: ${{ env.TWITTER_AUTH_TOKEN != '' }}
        env:
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
        run: |
          mkdir -p ~/.twitter-cli
          cat > ~/.twitter-cli/cookies.json << EOF
          {
            "auth_token": "${{ secrets.TWITTER_AUTH_TOKEN }}",
            "ct0": "${{ secrets.TWITTER_CT0 }}",
            "saved_at": $(python3 -c "import time; print(time.time())")
          }
          EOF
          echo "✓ Twitter Cookie 已注入"

      - name: 🚀 Generate AI Daily Report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          # 可选: glm-5.1 | minimax-m2.7
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          # 可选: rules | llm | (留空自动判断)
          CLASSIFY_METHOD: ${{ secrets.CLASSIFY_METHOD }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          AI_DAILY_GITHUB_TOKEN: ${{ secrets.AI_DAILY_GITHUB_TOKEN }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
          XHS_A1: ${{ secrets.XHS_A1 }}
          XHS_WEB_SESSION: ${{ secrets.XHS_WEB_SESSION }}
        run: npm start

      - name: 📊 Generate index pages
        run: node scripts/generate-index.js

      - name: 📤 Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add zh/ index.html zh/index.html 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "🤖 AI 日报 - $(date +%Y-%m-%d)" && git push)

      - name: 📦 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_number }}
          path: |
            zh/
          retention-days: 30
